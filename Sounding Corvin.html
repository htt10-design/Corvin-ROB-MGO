<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corvin Tank Monitor & Historie</title>
    <style>
        :root { 
            --bg: #121212; 
            --card: rgba(30, 30, 30, 0.9); 
            --accent: #00e676; 
            --manual: #2196f3; 
            --text: #ffffff; 
            --total-bg: #2c3e50;
            --date-bg: #34495e;
        }
        
        body { 
            font-family: sans-serif; 
            background-color: var(--bg);
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('corvin.jpg');
            background-size: 130%; /* Leicht gezoomt für mehr Spielraum */
            background-position: 20% 40%; /* Motiv nach unten verschoben */
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text); 
            padding: 0; 
            margin: 0; 
            min-height: 100vh;
        }
        
        .total-header { 
            position: sticky; top: 0; background: var(--total-bg); padding: 15px 20px; 
            z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border-bottom: 2px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center;
        }
        .total-value { font-size: 2.2rem; font-weight: bold; color: var(--accent); }

        .header-right { background: var(--date-bg); padding: 10px 15px; border-radius: 8px; text-align: center; }
        .date-input { background: #121212; border: 1px solid var(--accent); color: white; padding: 8px; border-radius: 4px; font-weight: bold; }

        .container { max-width: 500px; margin-left: 20px; padding: 20px 0 100px 0; }
        
        .tank-card { 
            background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; 
            border-left: 6px solid var(--accent); backdrop-filter: blur(5px);
        }
        .tank-card.manual { border-left-color: var(--manual); }
        
        .input-row { display: flex; align-items: center; gap: 15px; }
        input[type="number"] { width: 100%; background: #333; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; font-size: 1.1rem; }
        .res-display { background: #000; padding: 12px; border-radius: 8px; text-align: right; font-weight: bold; color: var(--accent); font-size: 1.3rem; }
        .label { font-size: 0.7rem; color: #ccc; text-transform: uppercase; display: block; margin-bottom: 5px; }

        /* Buttons */
        .btn-group { position: fixed; bottom: 25px; right: 25px; display: flex; gap: 10px; z-index: 1000; }
        .save-btn { background: var(--accent); color: #000; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .history-btn { background: #555; color: white; border: none; padding: 15px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        /* Sidebar Historie */
        .sidebar {
            position: fixed; right: -400px; top: 0; width: 350px; height: 100%;
            background: rgba(20, 20, 20, 0.95); box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: right 0.3s; z-index: 2000; padding: 20px; overflow-y: auto;
        }
        .sidebar.open { right: 0; }
        .sidebar h3 { border-bottom: 1px solid var(--accent); padding-bottom: 10px; }
        .history-item { 
            background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9rem; 
            border-left: 3px solid var(--accent);
        }
        .history-item b { color: var(--accent); }
        .item-actions { display: flex; gap: 5px; margin-top: 8px; }
        .item-actions button { flex: 1; padding: 5px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .load-btn { background: var(--accent); color: black; }
        .del-btn { background: #ff5252; color: white; }
    </style>
</head>
<body>

<div class="total-header">
    <div class="header-left">
        <h2 style="margin:0; font-size: 0.8rem; color:#aaa;">GESAMTVOLUMEN CORVIN</h2>
        <div id="grand-total" class="total-value">0.000 m³</div>
    </div>
    <div class="header-right">
        <span class="label" style="color:var(--accent)">Berichtsdatum</span>
        <input type="date" id="report-date" class="date-input">
    </div>
</div>

<div class="container" id="tank-container"></div>

<div class="sidebar" id="sidebar">
    <div style="display:flex; justify-content: space-between; align-items:center;">
        <h3>Historie</h3>
        <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
    </div>
    <div id="history-list"></div>
</div>

<div class="btn-group">
    <button class="history-btn" onclick="toggleSidebar()">HISTORIE</button>
    <button class="save-btn" onclick="saveData()">SPEICHERN</button>
</div>

<script>
    const tankData = {
        "Tank 3": { type: "manual", max: "N/A" },
        "Tank 4": { type: "table", max: 23.41, data: [{m: 0.05, vol: 0.029}, {m: 3.332, vol: 23.41}] }, // Daten hier vervollständigen
        "Tank 5": { type: "manual", max: 4.00 },
        "Tank 6": { type: "table", max: 30.31, data: [{m: 0.05, vol: 0.127}, {m: 4.019, vol: 30.313}] },
        "Tank 14": { type: "table", max: 21.00, data: [{m: 0.05, vol: 0.041}, {m: 1.773, vol: 21.018}] },
        "Tank 15": { type: "table", max: 24.52, data: [{m: 0.05, vol: 0.071}, {m: 4.125, vol: 24.52}] },
        "Tank 16": { type: "table", max: 24.52, data: [{m: 0.05, vol: 0.043}, {m: 4.177, vol: 24.52}] }
    };

    const currentVolumes = {};
    const container = document.getElementById('tank-container');

    // UI Initialisierung
    Object.keys(tankData).forEach(name => {
        currentVolumes[name] = 0;
        const tank = tankData[name];
        const card = document.createElement('div');
        card.className = `tank-card ${tank.type}`;
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><b>${name}</b><small>${tank.max !== "N/A" ? 'Max: '+tank.max+' m³' : ''}</small></div>
            <div class="input-row">
                <div style="flex:1">
                    <span class="label">${tank.type === 'table' ? 'Peilung (m)' : 'Eingabe (m³)'}</span>
                    <input type="number" step="0.001" id="input-${name}" oninput="handleInput('${name}', this.value)">
                </div>
                <div style="flex:1">
                    <span class="label">m³ Ergebnis</span>
                    <div id="res-${name}" class="res-display">0.000</div>
                </div>
            </div>`;
        container.appendChild(card);
    });

    function handleInput(name, val) {
        let vol = 0;
        const num = parseFloat(val) || 0;
        if(tankData[name].type === 'table') {
            const table = tankData[name].data;
            if(num >= table[0].m) {
                let found = false;
                for(let i=0; i<table.length-1; i++) {
                    if(num >= table[i].m && num <= table[i+1].m) {
                        vol = table[i].vol + (num - table[i].m) * (table[i+1].vol - table[i].vol) / (table[i+1].m - table[i].m);
                        found = true; break;
                    }
                }
                if(!found && num >= table[table.length-1].m) vol = table[table.length-1].vol;
            }
        } else { vol = num; }
        
        currentVolumes[name] = vol;
        document.getElementById(`res-${name}`).innerText = vol.toFixed(3);
        updateTotal();
    }

    function updateTotal() {
        const total = Object.values(currentVolumes).reduce((a,b) => a+b, 0);
        document.getElementById('grand-total').innerText = total.toFixed(3) + " m³";
    }

    function toggleSidebar() { 
        document.getElementById('sidebar').classList.toggle('open');
        renderHistory();
    }

    function saveData() {
        const entry = {
            id: Date.now(),
            date: document.getElementById('report-date').value,
            total: document.getElementById('grand-total').innerText,
            values: {}
        };
        Object.keys(tankData).forEach(n => {
            entry.values[n] = document.getElementById(`input-${n}`).value;
        });

        let history = JSON.parse(localStorage.getItem('tankHistory') || '[]');
        history.unshift(entry); // Neue oben
        localStorage.setItem('tankHistory', JSON.stringify(history));
        alert("Gespeichert!");
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        const history = JSON.parse(localStorage.getItem('tankHistory') || '[]');
        list.innerHTML = history.length === 0 ? '<p>Keine Einträge vorhanden.</p>' : '';
        
        history.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <div><b>${item.date}</b></div>
                <div>Gesamt: ${item.total}</div>
                <div class="item-actions">
                    <button class="load-btn" onclick="loadEntry(${item.id})">Laden</button>
                    <button class="del-btn" onclick="deleteEntry(${item.id})">Löschen</button>
                </div>`;
            list.appendChild(div);
        });
    }

    function loadEntry(id) {
        const history = JSON.parse(localStorage.getItem('tankHistory') || '[]');
        const entry = history.find(e => e.id === id);
        if(entry) {
            document.getElementById('report-date').value = entry.date;
            Object.keys(entry.values).forEach(name => {
                const input = document.getElementById(`input-${name}`);
                input.value = entry.values[name];
                handleInput(name, input.value);
            });
            toggleSidebar();
            alert("Daten geladen!");
        }
    }

    function deleteEntry(id) {
        if(confirm("Eintrag löschen?")) {
            let history = JSON.parse(localStorage.getItem('tankHistory') || '[]');
            history = history.filter(e => e.id !== id);
            localStorage.setItem('tankHistory', JSON.stringify(history));
            renderHistory();
        }
    }

    document.getElementById('report-date').valueAsDate = new Date();
</script>
</body>
</html>
